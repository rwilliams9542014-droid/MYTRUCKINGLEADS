<body class="auth-body auth-checking">
  <style>
    .auth-checking .auth-card {
      opacity: 0;
      pointer-events: none;
    }
  </style>
  <div class="auth-wrapper">
    <div class="auth-card bg-white shadow-lg rounded-4 p-4 p-md-5">
      <div class="text-center mb-4">
        <img src="assets/mytruckingleads-logo-icon.png" alt="" aria-hidden="true" class="mb-3" style="width: 58px; height: 58px; object-fit: contain;" />
        <h1 class="h3 fw-bold mb-1">Customer Login</h1>
        <p class="text-muted small mb-0">Sign in with your username or email.</p>
      </div>

      <div id="authMessage" class="d-none"></div>

      <form id="loginForm" method="post" novalidate>
        <div class="mb-3">
          <label class="form-label" for="loginIdentifier">Username or email address</label>
          <input id="loginIdentifier" name="identifier" type="text" class="form-control" placeholder="username or you@example.com" autocomplete="username" required />
        </div>
        <div class="mb-3">
          <label class="form-label d-flex justify-content-between" for="loginPassword">
            <span>Password</span>
            <a href="#" class="small">Forgot?</a>
          </label>
          <input id="loginPassword" name="password" type="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" required />
        </div>
        <button type="submit" id="loginSubmit" class="btn btn-primary w-100 mb-3">
          Sign In
        </button>
      </form>

      <p class="small text-center text-muted mb-0">
        New customer?
        <a href="signup.html">Create your account</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
